name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # required for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Set as repo secret once the store item exists. Empty = store step is skipped.
      CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build (server + extension + mcpb)
        run: npm run build:all

      - name: Pack Chrome extension zip
        run: |
          cd extension/dist
          zip -r ../../build/yolo-chrome-mcp-extension-${{ github.ref_name }}.zip .

      - name: Publish to npm
        run: cd server && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Auto-rollout to the Chrome Web Store. Skipped until CWS_* secrets are set.
      # One-time setup (token generation, getting the extension ID): docs/STORE_AUTO_ROLLOUT.md
      - name: Publish to Chrome Web Store
        if: env.CWS_EXTENSION_ID != ''
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: build/yolo-chrome-mcp-extension-${{ github.ref_name }}.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/yolo-chrome-mcp-*.mcpb
            build/yolo-chrome-mcp-extension-*.zip
          generate_release_notes: true
          body: |
            ## Install

            **Claude Code:**
            ```
            claude mcp add --scope user yolo-chrome -- npx -y yolo-chrome-mcp@latest
            npx yolo-chrome-mcp install   # extension load + routing hook + CLAUDE.md rule
            ```

            `--scope user` makes the server available in every project, not just
            the directory you ran the command from.

            **Claude Desktop:** download `yolo-chrome-mcp-*.mcpb` below and drag it onto Claude Desktop.

            **Chrome extension (manual):** download `yolo-chrome-mcp-extension-*.zip`, unzip, load at chrome://extensions → Load unpacked.
